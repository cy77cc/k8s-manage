global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerting_rules.yml
  - /etc/prometheus/ai_alerting_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Pushgateway 用于接收推送的指标
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # AI 服务指标抓取
  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:8080"]
    metrics_path: /metrics
